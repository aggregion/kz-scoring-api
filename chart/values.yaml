replicaCount: 1

image:
  repository: ghcr.io/aggregion/kz-scoring-api
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

config:
  vaultee_pipelines_api_url: "http://vlt-system-prod-vaultee-pipelines-internal:3009"
  vaultee_secrets_url: "http://vlt-system-prod-vaultee-secrets.vaultee.svc.cluster.local"
  beeline_secrets_url_for_pipeline: "http://vlt-system-prod-vaultee-secrets.vaultee.svc.cluster.local"
  salt_pkb_secret_token: "pkb_beeline/SALT_PKB"
  iin_salt: "secretsalt20260406"
  pipelines_service_subject: "kz-scoring-service"
  pipelines_tenant_id: ""
  pipelines:
    lookup_iin_only_template_id: ""
    lookup_iin_phone_template_id: ""
    executor_id: ""
  timeout_seconds: 30
  poll_interval_ms: 100
  max_concurrent_lookups: 10
  salt_cache_ttl_seconds: 300
  log_level: "INFO"

extraEnv: []
